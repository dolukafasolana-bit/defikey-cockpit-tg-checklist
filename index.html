<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DeFi KEY · DD Checklist</title>
<style>
  :root{
    --bg1:#0d1117; --bg2:#161b22; --bg3:#1c2128; --bg4:#21262d;
    --border:#30363d; --border2:#444c56;
    --accent:#58a6ff; --green:#3fb950; --red:#f85149; --yellow:#d29922;
    --text:#e6edf3; --text2:#adbac7; --text3:#768390;
    --radius-lg:14px;
    --mono:ui-monospace,'Space Mono','SFMono-Regular',Menlo,monospace;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg1);color:var(--text);font-family:var(--sans);
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:620px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-bottom:none;
    flex:1;display:flex;flex-direction:column;overflow:hidden}
  @media(min-width:640px){
    .wrap{padding:18px}
    .modal{border:1px solid var(--border2);border-radius:var(--radius-lg);
      box-shadow:0 20px 60px rgba(0,0,0,.6);min-height:auto}
  }

  /* Header */
  .head{padding:14px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
  .brand{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--text3);
    text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .brand b{color:var(--green);letter-spacing:.06em}
  .coin{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .coin .nm{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--text)}
  .coin .ch{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    color:var(--accent);background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3);
    padding:1px 7px;border-radius:999px}
  .ca{margin-top:6px;font-family:var(--mono);font-size:11px;color:var(--text3);
    word-break:break-all;line-height:1.4}
  .ca a{color:var(--text3);text-decoration:none;border-bottom:1px dotted var(--border2)}
  .ca a:hover{color:var(--accent)}
  .links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .links a{font-size:11px;color:var(--accent);text-decoration:none;
    border:1px solid var(--border2);border-radius:6px;padding:3px 10px;background:var(--bg4)}
  .links a:hover{border-color:var(--accent)}

  /* Body */
  .body{flex:1;overflow-y:auto;padding:12px 16px 4px}
  .section{margin-bottom:18px}
  .sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    color:var(--accent);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .row{display:flex;align-items:flex-start;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .label{flex:1;font-size:12px;color:var(--text2);padding-top:3px;line-height:1.35}
  .input{min-width:150px;max-width:58%}

  input[type=text],textarea,select{width:100%;background:var(--bg4);border:1px solid var(--border2);
    border-radius:5px;color:var(--text);font-size:12px;padding:5px 8px;outline:none;font-family:var(--sans)}
  input[type=text]:focus,textarea:focus,select:focus{border-color:var(--accent)}
  select{cursor:pointer}
  textarea{resize:vertical}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .multi{display:flex;flex-direction:column;gap:5px}
  .multi label{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);cursor:pointer}
  .grp{display:flex;flex-direction:column;gap:5px}
  .grp-row{display:flex;align-items:center;gap:6px}
  .grp-row .gl{flex:1;font-size:11px;color:var(--text2)}
  .tgl{padding:2px 9px;border-radius:4px;border:1px solid var(--border2);background:var(--bg4);
    color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono)}
  .tgl.ok.on{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green)}
  .tgl.no.on{background:rgba(248,81,73,.2);border-color:var(--red);color:var(--red)}
  .cond{margin-top:5px}
  .ro{font-family:var(--mono);font-size:11px;color:var(--text2);word-break:break-all}

  .print-val{display:none;font-size:12px;color:var(--text);font-family:var(--mono);
    white-space:pre-wrap;word-break:break-word}

  /* Footer */
  .foot{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--bg3);
    border-top:1px solid var(--border);position:sticky;bottom:0}
  .btn{padding:9px 16px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;
    font-family:var(--sans)}
  .btn-clear{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3)}
  .btn-save{background:var(--accent);color:#04101f}
  .btn-save:hover{background:#79c0ff}
  .hint{font-size:10px;color:var(--text3);text-align:center;padding:8px 16px 16px}
  .foot{flex-wrap:wrap}
  .btn-png{background:rgba(63,185,80,.16);color:var(--green);border:1px solid rgba(63,185,80,.35)}
  .btn-png:hover{background:rgba(63,185,80,.26)}

  /* PNG yakalama anı: butonları gizle, tüm form tam boyutta render olsun */
  /* PNG yakalama anı: butonları gizle + form kontrollerini gizleyip
     okunur metin değerlerini göster (PDF ile aynı görünüm, kırpılma olmaz) */
  .exporting .foot,.exporting .hint{display:none}
  .exporting .body{overflow:visible;max-height:none}
  .exporting .modal{height:auto}
  .exporting .input,.exporting textarea,.exporting .notes-row{display:none}
  .exporting .print-val{display:block;color:var(--text)}
  .exporting .print-val.empty{color:var(--text3)}

  /* ── PRINT / SAVE AS PDF ─────────────────────────────────────────── */
  @media print{
    @page{margin:14mm}
    html,body{background:#fff;color:#111}
    .wrap,.modal{max-width:none;margin:0;border:none;box-shadow:none;display:block}
    .head{background:#fff;border-bottom:2px solid #111;padding:0 0 10px}
    .brand{color:#555}.brand b{color:#111}
    .coin .nm{color:#000}
    .coin .ch{color:#111;background:#eee;border-color:#bbb}
    .ca{color:#444}.links{display:none}
    .body{padding:10px 0 0;overflow:visible}
    .section{break-inside:avoid;margin-bottom:12px}
    .sec-title{color:#000;border-bottom:1px solid #999}
    .row{border-bottom:1px solid #e2e2e2;color:#111}
    .label{color:#333;font-weight:600}
    .input{display:none}
    .print-val{display:block;color:#000}
    .print-val.empty{color:#aaa}
    .foot,.hint{display:none}
  }
</style>

<div class="wrap">
  <div class="modal">
    <div class="head">
      <div class="brand">📋 <b>DEFIKEY</b> · DD CHECKLIST</div>
      <div class="coin">
        <span class="nm" id="coinName">—</span>
        <span class="ch" id="coinChain" style="display:none"></span>
      </div>
      <div class="ca" id="coinCa"></div>
      <div class="links" id="coinLinks"></div>
    </div>

    <div class="body" id="formRoot"></div>

    <div class="foot">
      <button class="btn btn-clear" onclick="clearForm()">🗑 Temizle</button>
      <div style="flex:1"></div>
      <button class="btn btn-png" onclick="savePng()">🖼 PNG</button>
      <button class="btn btn-save" onclick="savePdf()">📥 PDF</button>
    </div>
    <div class="hint">Doldur → PDF ya da PNG indir → cihazına kaydet. Hiçbir veri sunucuya gitmez.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ── Checklist yapısı (checklist_config.json gömülü) ───────────────── */
const CONFIG = {
  sections: [
    { id:"chart_impression", title:"Chart", criteria:[
      { id:"ci_chart_shape", label:"Chart Görünümü", type:"select",
        options:["📈 Yükseliş trendi","📉 Düşüş trendi","➡️ Yatay / konsolidasyon","🔄 Dipten dönüş","💀 Ölü hacim","🚀 Breakout"] }
    ]},
    { id:"basic_analysis", title:"Basic Analysis", criteria:[
      { id:"ba_kategori", label:"Kategori", type:"select",
        options:["meme","viral","AI","AI Meme","Agent/Bot","gaming / P2E","RWA","DePIN","Blockchain & DeFi","Restaking","Prediction market","other utility"] },
      { id:"ba_proje_tanimi", label:"Proje Tanımı", type:"text" },
      { id:"ba_narrative", label:"Narrative", type:"text" },
      { id:"ba_important_features", label:"Important Features", type:"multiselect",
        options:["staking / farming","perp dex","revenue sharing","active dapp","testnet / mainnet","dao","lending (borç verme)","AI agent","Bot","important features aktif mi?","dApp deneme"] },
      { id:"ba_audit", label:"Audit", type:"checkbox" },
      { id:"ba_kyc", label:"KYC", type:"checkbox" },
      { id:"ba_doxxed", label:"Doxxed", type:"checkbox" },
      { id:"ba_social_website", label:"Web Site", type:"text" },
      { id:"ba_social_x", label:"X (Twitter)", type:"text" },
      { id:"ba_social_x_origin", label:"X Menşei", type:"text" },
      { id:"ba_social_telegram", label:"Telegram", type:"text" },
      { id:"ba_social_other", label:"Other", type:"text" },
      { id:"ba_social_oknok", label:"Social Kontrol", type:"ok_nok_group",
        options:["X mavi tik","X sarı tik","büyük ve tanınmış takipçi?"] },
      { id:"ba_listelemeler", label:"Listelemeler", type:"multiselect",
        options:["cmc","cg","wello","cex1","cex2","cex3"] },
      { id:"ba_launch_method", label:"Launch Method", type:"select",
        options:["pumpfun","bonkfun","bags","raydium","others","solidity","4,klik pumpfun","pinksale"] }
    ]},
    { id:"technical_analysis", title:"Technical Analysis", criteria:[
      { id:"ta_contract", label:"Contract", type:"multiselect",
        options:["first deployed (OG)","first mover","uniq (ör; 0xbabe)","tanınmış deployer"] },
      { id:"ta_initial_lp", label:"Initial LP [$]", type:"text" },
      { id:"ta_likidite_kilit", label:"Likidite Kilit Süresi", type:"select_with_conditional",
        options:["burnt","locked"],
        conditional:{ trigger_value:"locked", extra_id:"ta_likidite_open_date", extra_placeholder:"Open date" } },
      { id:"ta_ownership", label:"Ownership", type:"select", options:["owner","renounced"],
        shows_criteria_on:"owner", controls:["ta_contract_riskleri"] },
      { id:"ta_contract_riskleri", label:"Contract Riskleri", type:"yes_no_group",
        options:["mint","trade status","change fee","modify max transaction limit","blacklist","buy/sell cooldown"],
        hidden_by_default:true },
      { id:"ta_cuzdan", label:"Cüzdan Kontrolleri", type:"yes_no_group",
        options:["Yüklü cüzdanlar var mı","Boşta cüzdan var mı","Dağılımlar homojen mi - bubble maps"] },
      { id:"ta_chart_analizi", label:"Chart Analizi", type:"ok_nok_group",
        options:["1h-4h-12h-1d-3d-1w kontrol","regular yapı mevcut mu","destek seviyesi var mı","yükselen trend var mı","TA-PATTERN var mı"] },
      { id:"ta_deployer", label:"Deployer Address", type:"readonly_text" },
      { id:"ta_contract_address", label:"Contract Address", type:"readonly_text" },
      { id:"ta_pair_address", label:"Pair Address", type:"readonly_text" }
    ]}
  ]
};

/* ── Coin kimliği: URL parametrelerinden (yoksa WORTHLESS demo) ─────── */
const qs = new URLSearchParams(location.search);
const COIN = {
  name:   qs.get("name")  || "WORTHLESS/USDC",
  ca:     qs.get("ca")    || "Drv7SrSQJUcAN6WcXYrFM4EZDkzP4AjhSJv1AZGxpump",
  pair:   qs.get("pair")  || "Auyw9RHNpFK1Nrh9tPs8LAr8KCYaQatYB7JP64jGyomw",
  chain: (qs.get("chain") || "solana").toLowerCase(),
  deployer: qs.get("deployer") || ""
};

const state = {};                       // tüm form verisi burada (sadece bellekte)
const SKIP_IDS = ["ba_pair_address","ba_contract"];   // React'te gizlenenler
const SKIP_TYPES = ["chart_link","other_projects"];   // API gerektirenler → atla

/* ── Header doldur ─────────────────────────────────────────────────── */
document.getElementById("coinName").textContent = COIN.name;
const chEl = document.getElementById("coinChain");
chEl.textContent = COIN.chain; chEl.style.display = "";
document.getElementById("coinCa").innerHTML =
  COIN.ca ? `CA: <a href="https://dexscreener.com/${COIN.chain}/${COIN.pair||COIN.ca}" target="_blank" rel="noreferrer">${COIN.ca}</a>` : "";
const linksEl = document.getElementById("coinLinks");
linksEl.innerHTML =
  `<a href="https://dexscreener.com/${COIN.chain}/${COIN.pair||COIN.ca}" target="_blank" rel="noreferrer">📊 DexScreener</a>`
  + (COIN.chain==="solana" ? `<a href="https://solscan.io/token/${COIN.ca}" target="_blank" rel="noreferrer">🔎 Solscan</a>` : "")
  + `<a href="https://x.com/search?q=${encodeURIComponent(COIN.ca)}" target="_blank" rel="noreferrer">𝕏 Ara</a>`;

/* readonly alanları coin kimliğiyle önceden doldur */
const RO_PREFILL = { ta_deployer: COIN.deployer, ta_contract_address: COIN.ca, ta_pair_address: COIN.pair };

/* ── Okunabilir değer (PDF/print için) ─────────────────────────────── */
function readable(c, v){
  if(c.type==="checkbox") return v ? "✓ Evet" : "—";
  if(c.type==="multiselect"||c.type==="ta_contract") {}
  if(c.type==="multiselect") return (Array.isArray(v)&&v.length) ? v.join(", ") : "—";
  if(c.type==="ok_nok_group"||c.type==="yes_no_group"){
    const o = v||{}; const yes = c.type==="yes_no_group"?"YES":"OK"; const no = c.type==="yes_no_group"?"NO":"NOK";
    const parts = (c.options||[]).map((opt,i)=>{ const s=o["opt_"+i]; if(!s) return null;
      return `${opt}: ${s==="ok"?yes:no}`; }).filter(Boolean);
    return parts.length ? parts.join("\n") : "—";
  }
  if(c.type==="select_with_conditional"){
    if(!v) return "—";
    if(v===c.conditional.trigger_value){ const ex=state[c.conditional.extra_id]; return ex?`${v} (${ex})`:v; }
    return v;
  }
  if(c.type==="readonly_text") return v || "—";
  return (v===undefined||v===null||v==="") ? "—" : String(v);
}

/* ── Tek kriter için kontrol üret ──────────────────────────────────── */
function buildInput(c){
  const wrap = document.createElement("div");
  const sync = (val)=>{ state[c.id]=val; refreshConditionals(); updatePrint(c); };

  if(c.type==="checkbox"){
    const i=document.createElement("input"); i.type="checkbox";
    i.onchange=()=>sync(i.checked); wrap.appendChild(i);
  }
  else if(c.type==="text"){
    const i=document.createElement("input"); i.type="text"; i.placeholder="...";
    i.oninput=()=>sync(i.value); wrap.appendChild(i);
  }
  else if(c.type==="readonly_text"){
    const s=document.createElement("div"); s.className="ro";
    const val = RO_PREFILL[c.id] || ""; state[c.id]=val;
    s.textContent = val || "—"; wrap.appendChild(s);
  }
  else if(c.type==="select"){
    const sel=document.createElement("select");
    sel.innerHTML='<option value="">— seç —</option>'+(c.options||[]).map(o=>`<option>${o}</option>`).join("");
    sel.onchange=()=>sync(sel.value); wrap.appendChild(sel);
  }
  else if(c.type==="select_with_conditional"){
    const sel=document.createElement("select");
    sel.innerHTML='<option value="">— seç —</option>'+(c.options||[]).map(o=>`<option>${o}</option>`).join("");
    const cond=document.createElement("input"); cond.type="text"; cond.className="cond";
    cond.placeholder=c.conditional.extra_placeholder||"..."; cond.style.display="none";
    cond.oninput=()=>{ state[c.conditional.extra_id]=cond.value; updatePrint(c); };
    sel.onchange=()=>{ sync(sel.value);
      cond.style.display = sel.value===c.conditional.trigger_value ? "block":"none"; };
    wrap.appendChild(sel); wrap.appendChild(cond);
  }
  else if(c.type==="multiselect"){
    const box=document.createElement("div"); box.className="multi"; const cur=[];
    (c.options||[]).forEach(o=>{
      const lb=document.createElement("label"); const cb=document.createElement("input"); cb.type="checkbox";
      cb.onchange=()=>{ cb.checked?cur.push(o):cur.splice(cur.indexOf(o),1); sync([...cur]); };
      lb.appendChild(cb); lb.appendChild(document.createTextNode(o)); box.appendChild(lb);
    });
    wrap.appendChild(box);
  }
  else if(c.type==="ok_nok_group"||c.type==="yes_no_group"){
    const isYN=c.type==="yes_no_group"; const grp=document.createElement("div"); grp.className="grp";
    const obj={}; state[c.id]=obj;
    (c.options||[]).forEach((o,i)=>{
      const r=document.createElement("div"); r.className="grp-row";
      const gl=document.createElement("span"); gl.className="gl"; gl.textContent=o;
      const bo=document.createElement("button"); bo.className="tgl ok"; bo.textContent=isYN?"YES":"OK";
      const bn=document.createElement("button"); bn.className="tgl no"; bn.textContent=isYN?"NO":"NOK";
      bo.onclick=()=>{ obj["opt_"+i]=obj["opt_"+i]==="ok"?null:"ok";
        bo.classList.toggle("on",obj["opt_"+i]==="ok"); bn.classList.remove("on"); updatePrint(c); };
      bn.onclick=()=>{ obj["opt_"+i]=obj["opt_"+i]==="nok"?null:"nok";
        bn.classList.toggle("on",obj["opt_"+i]==="nok"); bo.classList.remove("on"); updatePrint(c); };
      r.appendChild(gl); r.appendChild(bo); r.appendChild(bn); grp.appendChild(r);
    });
    wrap.appendChild(grp);
  }
  else { const s=document.createElement("span"); s.style.color="var(--text3)"; s.textContent="—"; wrap.appendChild(s); }
  return wrap;
}

/* ── Print değerini güncelle ───────────────────────────────────────── */
const printSpans = {};
function updatePrint(c){
  const sp=printSpans[c.id]; if(!sp) return;
  const txt=readable(c, state[c.id]); sp.textContent=txt;
  sp.classList.toggle("empty", txt==="—");
}

/* ── Koşullu görünürlük (ta_contract_riskleri vb.) ─────────────────── */
const condRows=[];
function refreshConditionals(){
  condRows.forEach(({row,ctrlId,showOn})=>{
    row.style.display = state[ctrlId]===showOn ? "" : "none";
  });
}

/* ── Formu çiz ─────────────────────────────────────────────────────── */
const root=document.getElementById("formRoot");
CONFIG.sections.forEach(sec=>{
  if(["Pair Address","Contract"].includes(sec.title)) return;
  const crits=(sec.criteria||[]).filter(c=>!SKIP_TYPES.includes(c.type)&&!SKIP_IDS.includes(c.id));
  if(!crits.length) return;
  const sdiv=document.createElement("div"); sdiv.className="section";
  const st=document.createElement("div"); st.className="sec-title"; st.textContent=sec.title; sdiv.appendChild(st);
  crits.forEach(c=>{
    const row=document.createElement("div"); row.className="row";
    const lab=document.createElement("div"); lab.className="label"; lab.textContent=c.label;
    const inp=document.createElement("div"); inp.className="input"; inp.appendChild(buildInput(c));
    const pv=document.createElement("div"); pv.className="print-val empty"; pv.textContent="—"; printSpans[c.id]=pv;
    row.appendChild(lab); row.appendChild(inp); row.appendChild(pv); sdiv.appendChild(row);
    // koşullu kayıt
    if(c.hidden_by_default){
      const ctrl=CONFIG.sections.flatMap(s=>s.criteria).find(x=>x.controls&&x.controls.includes(c.id));
      if(ctrl){ condRows.push({row,ctrlId:ctrl.id,showOn:ctrl.shows_criteria_on}); }
    }
    updatePrint(c);
  });
  root.appendChild(sdiv);
});

/* Notlar */
const nsec=document.createElement("div"); nsec.className="section";
nsec.innerHTML='<div class="sec-title">Notlar</div>';
const nrow=document.createElement("div"); nrow.className="row notes-row"; nrow.style.borderBottom="none";
const ta=document.createElement("textarea"); ta.rows=4; ta.placeholder="Notlarını buraya yaz...";
ta.style.width="100%"; ta.oninput=()=>{ state._notes=ta.value; npv.textContent=ta.value||"—"; npv.classList.toggle("empty",!ta.value); };
const npv=document.createElement("div"); npv.className="print-val empty"; npv.textContent="—";
const ninp=document.createElement("div"); ninp.style.flex="1"; ninp.appendChild(ta);
nrow.appendChild(ninp); nsec.appendChild(nrow); nsec.appendChild(npv); root.appendChild(nsec);

refreshConditionals();

/* ── Aksiyonlar ────────────────────────────────────────────────────── */
document.title = "DD " + COIN.name;     // PDF kaydederken varsayılan dosya adı

function savePdf(){ window.print(); }   // tarayıcı: "PDF olarak kaydet"

async function savePng(){
  if(typeof html2canvas==="undefined"){ alert("PNG kütüphanesi yüklenemedi (internet?). PDF'i kullanabilirsin."); return; }
  const node=document.querySelector(".modal");
  document.body.classList.add("exporting");
  try{
    const canvas=await html2canvas(node,{
      backgroundColor:"#0d1117",
      scale:Math.min(3, Math.max(2, window.devicePixelRatio||1)),   // 2–3x → net yazı
      windowWidth:node.scrollWidth,
      useCORS:true
    });
    const a=document.createElement("a");
    const safe=COIN.name.replace(/[^\w-]+/g,"_");
    a.download=`DD_${safe}_${new Date().toISOString().slice(0,10)}.png`;
    a.href=canvas.toDataURL("image/png");
    a.click();
  }catch(e){ alert("PNG oluşturulamadı: "+e); }
  finally{ document.body.classList.remove("exporting"); }
}

function clearForm(){
  if(!confirm("Tüm doldurulan alanlar temizlensin mi?")) return;
  location.reload();
}
</script>
